<h2 class="section-title">二、🧬 技术路线演进（核心模块）</h2>
<div class="spacer"></div>
<hr class="divider">
<div class="spacer"></div>
<h3 class="subsection-title">2.1 全双工语音：从"对话模式"到"感知模式"的范式跃迁</h3>
<div class="spacer"></div>
<div class="sub-label">【技术变化】</div>
<p>语音AI的交互模式从半双工（一问一答）→ 全双工（同步感知+响应），底层架构从"串行处理"转向"并行流式推理"。</p>
<div class="spacer"></div>
<div class="sub-label">【旧范式 vs 新范式】</div>
<div class="table-wrapper"><table><thead><tr><th>维度</th><th>旧范式（半双工）</th><th>新范式（全双工）</th></tr></thead><tbody><tr><td>交互模式</td><td>轮流发言，等待停顿</td><td>边听边说，实时打断</td></tr><tr><td>架构</td><td>ASR→LLM→TTS 串行管线</td><td>端到端原生语音模型</td></tr><tr><td>用户体验</td><td>感觉像打电话给客服</td><td>感觉像在和人说话</td></tr><tr><td>代表缺陷</td><td>打断响应慢，背景噪声干扰大</td><td>算力成本高，情感建模待完善</td></tr></tbody></table></div>
<div class="sub-label">【谁在推动】</div>
<ul><li>字节跳动（Seeduplex，已商用）</li><li>OpenAI（GPT-4o Voice，仍有延迟）</li><li>ElevenLabs、Hume AI（情感语音层）</li></ul>
<div class="spacer"></div>
<div class="sub-label">【判断】</div>
<div class="icon-line"><span class="icon-lead">✅</span><strong class="highlight-purple">成立，处于中期阶段</strong>。底层技术路线已确立，商业化刚开始。下一个关键战场：情感感知 + 多轮记忆 + 个性化声线，预计2026年底-2027年初进入爆发期。</div>
<div class="spacer"></div>
<hr class="divider">
<div class="spacer"></div>
<h3 class="subsection-title">2.2 具身智能：语义-动作鸿沟首次系统性被填补</h3>
<div class="spacer"></div>
<div class="sub-label">【技术变化】</div>
<p>智元机器人发布 <strong class="highlight-purple">GO-2（Genie Operator-2）</strong>，首创"动作思维链"（Action Chain-of-Thought）机制 + 异步双系统架构，让机器人在动作空间直接进行推理规划（而非仅在语言空间规划后翻译为动作），刷新多项行业SOTA基准。</p>
<div class="spacer"></div>
<div class="sub-label">【旧范式 vs 新范式】</div>
<div class="table-wrapper"><table><thead><tr><th>维度</th><th>旧范式</th><th>新范式（GO-2）</th></tr></thead><tbody><tr><td>推理空间</td><td>语言空间推理 → 翻译 → 动作执行（两步，存在语义损失）</td><td>直接在动作空间推理（一步）</td></tr><tr><td>系统架构</td><td>单一系统，顺序处理</td><td>异步双系统（慢思考+快执行解耦）</td></tr><tr><td>核心问题</td><td>"知而不行"——理解意图但执行失败</td><td>"知行合一"——推理即执行</td></tr></tbody></table></div>
<div class="sub-label">【谁在推动】</div>
<p>智元机器人（GO-2）、宇树科技（Unitree）、Tesla Optimus、Physical Intelligence（π₀）</p>
<div class="spacer"></div>
<div class="sub-label">【判断】</div>
<div class="icon-line"><span class="icon-lead">✅</span><strong class="highlight-purple">成立，处于早期-中期过渡阶段</strong>。"动作思维链"是具身智能领域近一年最重要的算法突破，但泛化性（跨任务、跨场景）仍是最大挑战。2026年具身智能进入"示范性商用"阶段，大规模量产仍需12-18个月。</div>
<div class="spacer"></div>
<hr class="divider">

<h3 class="subsection-title">2.3 Multi-Agent协同：从单Agent到Agent集群的架构确立</h3>

<div class="sub-label">【技术变化】</div>
<p>腾讯QClaw V2上线多Agent功能，支持同时拉起3个Agent并行协作，每个Agent可独立定制角色/能力边界，并通过跨应用连接器（Connector）与外部工具直连。MCP（Model Context Protocol）正在成为Agent-工具通信的事实标准。</p>
<div class="spacer"></div>
<div class="sub-label">【旧范式 vs 新范式】</div>
<div class="table-wrapper"><table><thead><tr><th>维度</th><th>旧范式</th><th>新范式</th></tr></thead><tbody><tr><td>工作单元</td><td>单个LLM响应</td><td>Agent集群协同执行</td></tr><tr><td>任务类型</td><td>单轮/简单多轮</td><td>长任务拆解/并行执行</td></tr><tr><td>工具接入</td><td>手动API集成</td><td>MCP标准化工具调用</td></tr><tr><td>架构描述</td><td>"对话框"</td><td>"数字员工团队"</td></tr></tbody></table></div>
<div class="sub-label">【谁在推动】</div>
<p>腾讯云（QClaw V2）、Anthropic（MCP标准制定者）、OpenAI（Operator/Assistants API）、字节（扣子）</p>
<div class="spacer"></div>
<div class="sub-label">【判断】</div>
<div class="icon-line"><span class="icon-lead">✅</span><strong class="highlight-purple">确定性阶段</strong>。Multi-Agent架构已成为行业共识，2026年竞争重心在于：①任务调度算法的优劣；②工具生态的丰富度；③Agent间通信协议的标准化（MCP vs A2A）。平台型公司将通过生态锁定形成<span class="purple-keyword">壁垒</span>。</div>
<div class="spacer"></div>
<hr class="divider">
<div class="spacer"></div>
<h3 class="subsection-title">2.4 开源生态加速：前沿能力"平权化"趋势不可逆</h3>

<ul><li>旧：Google开源模型带有商业限制，企业部署存在合规障碍</li><li>新：Apache 2.0完全自由，可商业闭源使用 → <strong class="highlight-purple">开源生态堤坝决口</strong></li></ul>

<div class="sub-label">【判断】</div>

        const dateReports = {};
        
        // 初始化 dateReports
        Object.keys(reports).forEach(key => {
            const dateKey = key.replace('africa-', '');
            if (!dateReports[dateKey]) dateReports[dateKey] = [];
            dateReports[dateKey].push(key);
        });
        
        // 分类标签点击
        function filterCategory(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.cat-tab').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            
            // 加载当前分类的最新日报
            const allDates = Object.keys(dateReports).sort().reverse();
            for (const dateKey of allDates) {
                const reportKey = findReportByCategory(dateKey, cat);
                if (reportKey) {
                    const item = document.querySelector(`.report-item[data-date="${dateKey}"]`);
                    if (item) loadReportByDate(dateKey, item);
                    break;
                }
            }
        }
        
        // 根据日期和分类查找对应日报
        function findReportByCategory(dateKey, cat) {
            if (cat === 'all') return dateReports[dateKey][0]; // 取该日期第一份
            
            // 优先匹配分类
            for (const key of dateReports[dateKey]) {
                if (cat === 'ai' && !key.startsWith('africa')) return key;
                if (cat === 'africa' && key.startsWith('africa')) return key;
            }
            return null;
        }
        
        // 日期点击
        function loadReportByDate(dateKey, el) {
            document.querySelectorAll('.report-item').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            
            const reportKey = findReportByCategory(dateKey, currentCategory);
            const content = document.getElementById('reportContent');
            
            if (reportKey && reports[reportKey]) {
                content.innerHTML = reports[reportKey];
            } else {
                content.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-light);"><p>该日期暂无「' + 
                    (currentCategory === 'ai' ? 'AI行业日报' : currentCategory === 'africa' ? '非洲投融资日报' : '') + 
                    '」</p></div>';
            }
            content.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        // 默认加载：最新日期 + AI行业日报
        window.addEventListener('DOMContentLoaded', function() {
            const allDates = Object.keys(dateReports).sort().reverse();
            if (allDates.length > 0) {
                const latestDate = allDates[0];

                const aiTab = document.querySelector('.cat-tab[data-cat="ai"]');
                if (aiTab) aiTab.classList.add('active');
                
                const item = document.querySelector(`.report-item[data-date="${latestDate}"]`);
                if (item) loadReportByDate(latestDate, item);
            }
        });
